<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — The Margin</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf8f4;
  --ink: #1c1a17;
  --muted: #888279;
  --border: #e5e0d7;
  --accent: #2563eb;
}
body {
  min-height: 100vh;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.container {
  width: 100%;
  max-width: 420px;
}

/* Logo */
.logo {
  text-align: center;
  margin-bottom: 36px;
}
.logo a {
  font-family: 'Lora', serif;
  font-size: 28px;
  font-style: italic;
  color: var(--ink);
  text-decoration: none;
}
.logo p {
  color: var(--muted);
  font-size: 14px;
  margin-top: 6px;
}

/* Card */
.card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 32px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.06);
}

/* Tabs */
.tabs {
  display: flex;
  border-bottom: 2px solid var(--border);
  margin-bottom: 28px;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.3s;
}
.tab.active { color: var(--ink); border-color: var(--accent); }

.form-panel { display: none; }
.form-panel.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.form-title {
  font-family: 'Lora', serif;
  font-size: 24px;
  margin-bottom: 4px;
  color: var(--ink);
}
.form-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

.field { margin-bottom: 18px; }
label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
}
input[type="text"],
input[type="email"],
input[type="password"] {
  width: 100%;
  padding: 13px 16px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--ink);
  background: #fff;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.forgot {
  text-align: right;
  margin-bottom: 20px;
}
.forgot a { color: var(--accent); font-size: 13px; text-decoration: none; }

.checkbox-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 22px;
}
.checkbox-row input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
.checkbox-row label {
  font-size: 13px; font-weight: 400;
  letter-spacing: 0; text-transform: none;
  color: var(--muted); cursor: pointer; margin: 0;
}
.checkbox-row a { color: var(--accent); text-decoration: none; }

.btn-primary {
  width: 100%; padding: 14px;
  background: var(--ink); color: #fff;
  border: none; border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 500;
  cursor: pointer; letter-spacing: 0.3px;
  transition: background 0.2s, transform 0.1s;
}
.btn-primary:hover { background: #2d2a25; }
.btn-primary:active { transform: scale(0.99); }

.divider {
  text-align: center; color: var(--muted);
  font-size: 12px; margin: 18px 0;
  position: relative;
}
.divider::before, .divider::after {
  content: ''; position: absolute;
  top: 50%; width: 42%; height: 1px;
  background: var(--border);
}
.divider::before { left: 0; }
.divider::after { right: 0; }

.social-btns { display: flex; gap: 10px; }
.btn-social {
  flex: 1; padding: 11px;
  border: 1.5px solid var(--border);
  border-radius: 10px; background: #fff;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 13px; color: var(--ink);
  transition: border-color 0.2s, background 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-social:hover { border-color: var(--ink); background: var(--bg); }

/* Strength bar */
.strength-bar { display: flex; gap: 4px; margin-top: 8px; }
.strength-seg { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background 0.3s; }

/* Toast */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%);
  background: var(--ink); color: #fff;
  padding: 11px 22px; border-radius: 10px;
  font-size: 14px; opacity: 0;
  transition: opacity 0.3s; pointer-events: none;
  border-left: 4px solid var(--accent);
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* Back link */
.back-link {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--muted);
}
.back-link a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}

@media (max-width: 480px) {
  .card { padding: 28px 20px; }
  .field-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <!-- Logo -->
  <div class="logo">
    <a href="blog.html">The Margin</a>
    <p>Sign in to access your account</p>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Sign In</div>
      <div class="tab" onclick="switchTab('register')">Create Account</div>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
      <div class="form-title">Welcome back</div>
      <div class="form-sub">Sign in to continue reading.</div>

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
      <button class="btn-primary" onclick="handleLogin()">Sign In</button>

      <div class="divider">or continue with</div>
      <div class="social-btns">
        <button class="btn-social">🌐 Google</button>
        <button class="btn-social">🐙 GitHub</button>
      </div>
    </div>

    <!-- REGISTER -->
    <div class="form-panel" id="panel-register">
      <div class="form-title">Join The Margin</div>
      <div class="form-sub">Create your free account.</div>

      <div class="field-row">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="reg-first" placeholder="Jane">
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="reg-last" placeholder="Doe">
        </div>
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Min. 8 characters" oninput="checkStrength(this.value)">
        <div class="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="terms">
        <label for="terms">I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></label>
      </div>
      <button class="btn-primary" onclick="handleRegister()">Create Account</button>

      <div class="divider">or continue with</div>
      <div class="social-btns">
        <button class="btn-social">🌐 Google</button>
        <button class="btn-social">🐙 GitHub</button>
      </div>
    </div>
  </div>

  <div class="back-link">
    ← <a href="index.html">Back to The Margin</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  const idx = tab === 'login' ? 0 : 1;
  document.querySelectorAll('.tab')[idx].classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

function showToast(msg, success = true) {
  const t = document.getElementById('toast');
  t.textContent = (success ? '✓ ' : '✕ ') + msg;
  t.style.borderLeftColor = success ? '#22c55e' : '#ef4444';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) return showToast('Please fill all fields', false);
  if (!email.includes('@')) return showToast('Invalid email address', false);
  showToast('Signed in successfully!');
  setTimeout(() => window.location.href = 'blog.html', 1500);
}

function handleRegister() {
  const first = document.getElementById('reg-first').value.trim();
  const last = document.getElementById('reg-last').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const terms = document.getElementById('terms').checked;
  if (!first || !last || !email || !pass) return showToast('Please fill all fields', false);
  if (!email.includes('@')) return showToast('Invalid email address', false);
  if (pass.length < 8) return showToast('Password too short', false);
  if (!terms) return showToast('Please accept the terms', false);
  showToast('Account created! Welcome, ' + first + '!');
  setTimeout(() => window.location.href = 'blog.html', 1500);
}

function checkStrength(val) {
  const segs = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
  const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  segs.forEach((s, i) => s.style.background = i < score ? colors[score-1] : '#e5e0d7');
}
</script>
</body>
</html>
